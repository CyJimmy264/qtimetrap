plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.2
  UseCache: false
  Exclude:
    - 'coverage/**/*'
    - 'vendor/**/*'
    - 'build/**/*'
    - 'packaging/rpm/**/*.spec'

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call

Metrics/MethodLength:
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call

Metrics/ModuleLength:
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call

Style/Documentation:
  Exclude:
    - 'spec/**/*'
    - 'test/**/*'

Naming/PredicateMethod:
  AllowedMethods:
    - on_event
    - on_signal
    - off_event
    - off_signal

RSpec/SharedExamples:
  EnforcedStyle: symbol

RSpec/SpecFilePathFormat:
  Enabled: false
